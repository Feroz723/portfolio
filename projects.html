<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse Feroz's portfolio of web development projects including e-commerce platforms, task management apps, and interactive dashboards.">
  <link rel="canonical" href="/projects.html">
  <title>Projects - Feroz | Portfolio</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
  <div id="header"></div>

  <main>
    <section class="hero" style="padding: 3rem 0;">
      <div class="container">
        <h1>My Projects</h1>
        <p>A showcase of my recent work and side projects</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="filter-container">
          <h3>Filter by Technology</h3>
          <div class="filter-chips" id="filter-chips">
          </div>
        </div>

        <div class="grid" id="projects-grid">
          <noscript>
            <div class="card">
              <img src="/assets/images/proj1-thumb.jpg" alt="E-Commerce Platform" loading="lazy">
              <h3>E-Commerce Platform</h3>
              <p>A full-featured e-commerce platform with shopping cart, payment integration, and admin dashboard.</p>
              <div class="tags">
                <span class="tag">React</span>
                <span class="tag">Node.js</span>
                <span class="tag">MongoDB</span>
                <span class="tag">Stripe</span>
              </div>
              <a href="/projects/project-1.html" class="cta-button">View Details</a>
            </div>
            <div class="card">
              <img src="/assets/images/proj2-thumb.jpg" alt="Task Management App" loading="lazy">
              <h3>Task Management App</h3>
              <p>A collaborative task management application with real-time updates and team collaboration features.</p>
              <div class="tags">
                <span class="tag">Vue.js</span>
                <span class="tag">Firebase</span>
                <span class="tag">WebSockets</span>
              </div>
              <a href="/projects/project-2.html" class="cta-button">View Details</a>
            </div>
            <div class="card">
              <img src="/assets/images/hero-placeholder.jpg" alt="Weather Dashboard" loading="lazy">
              <h3>Weather Dashboard</h3>
              <p>An interactive weather dashboard with forecasts, maps, and historical data visualization.</p>
              <div class="tags">
                <span class="tag">JavaScript</span>
                <span class="tag">APIs</span>
                <span class="tag">Charts</span>
              </div>
              <a href="/projects.html" class="cta-button">Learn More</a>
            </div>
          </noscript>
        </div>
      </div>
    </section>

    <section class="section" style="background-color: var(--surface);">
      <div class="container">
        <div class="section-title">
          <h2>Interested in My Work?</h2>
          <p>Let's discuss your next project</p>
        </div>
        <div style="text-align: center;">
          <a href="/contact.html" class="cta-button">Contact Me</a>
          <a href="/about.html" class="cta-button secondary">Learn More About Me</a>
        </div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="/assets/js/include.js"></script>
  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/theme.js" defer></script>
  <script src="/assets/js/projects.js" defer></script>
</body>
</html>
